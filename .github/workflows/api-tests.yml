name: Run API Tests with Newman

on:
  push:
    branches: [ "main" ]
  pull_request:
 
permissions:
  contents: write
jobs:
  newman-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Create reports folder
        run: mkdir -p reports

      - name: Run Postman Collection
        run: newman run collection/Test-collection.postman_collection.json -e environments/test.postman_environment.json -r cli,htmlextra --reporter-htmlextra-export reports/report.html --reporter-htmlextra-title "Fintech API QA Report"

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: reports/report.html
          
      - name: Commit and Push Report
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add reports/report.html

          git commit -m "Update test report [skip ci]" || echo "No changes"

          git push